<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduAgent AI — Adaptive Learning Companion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f6; color: #1a1a18; }
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f4f4f2;
      --color-background-tertiary: #f0efeb;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5c5c58;
      --color-text-tertiary: #9c9c97;
      --color-border-tertiary: rgba(0,0,0,0.08);
      --color-border-secondary: rgba(0,0,0,0.15);
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a1a;
        --color-background-secondary: #222222;
        --color-background-tertiary: #181818;
        --color-text-primary: #e8e8e4;
        --color-text-secondary: #9c9c97;
        --color-text-tertiary: #5c5c58;
        --color-border-tertiary: rgba(255,255,255,0.08);
        --color-border-secondary: rgba(255,255,255,0.15);
      }
      body { background: #181818; color: #e8e8e4; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
